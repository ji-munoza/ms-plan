server:
  port: 8082

spring:
  application:
    name: ms-plan

  datasource:
    url: jdbc:mysql://localhost:3306/gimnasio_db
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  file:
    name: logs/ms-plan.log
  level:
    root: INFO
    cl.plataforma_gimnasio: INFO